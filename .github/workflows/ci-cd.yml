name: CI/CD

on:
  push:
    branches:
      - '**'

jobs:
  gradle-build:
    runs-on: ubuntu-latest
    container:
      image: gradle:8-jdk21
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: gradle clean build -x test

  docker-build-production:
    needs: gradle-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sifpi-be:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sifpi-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-staging:
    needs: gradle-build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sifpi-be:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sifpi-be:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: docker-build-production
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
    steps:
      - name: Deploy to Railway (production)
        run: railway redeploy --service=${{ secrets.SVC_ID }} -y

  deploy-staging:
    needs: docker-build-staging
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
    steps:
      - name: Deploy to Railway (staging)
        run: railway redeploy --service=${{ secrets.SVC_ID }} -y

name: CI/CD

on:
  push:
    branches:
      - '**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway (production)
        uses: fjogeleit/http-request-action@v1
        with:
          url: https://backboard.railway.app/graphql/v2
          method: POST
          customHeaders: '{"Content-Type": "application/json", "Authorization": "Bearer ${{ secrets.RAILWAY_TOKEN_PROD }}"}'
          data: >
            {
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENV_ID_PROD }}\", serviceId: \"${{ secrets.SVC_ID }}\") }"
            }

  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway (staging)
        uses: fjogeleit/http-request-action@v1
        with:
          url: https://backboard.railway.app/graphql/v2
          method: POST
          customHeaders: '{"Content-Type": "application/json", "Authorization": "Bearer ${{ secrets.RAILWAY_TOKEN_STAGING }}"}'
          data: >
            {
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENV_ID_STAGING }}\", serviceId: \"${{ secrets.SVC_ID }}\") }"
            }

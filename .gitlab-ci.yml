workflow:
  rules:
    - if: $CI_COMMIT_BRANCH

stages:
  - build
  - docker
  - deploy

gradle-build:
  stage: build
  image: gradle:8-jdk21
  script:
    - gradle clean build -x test

docker-build-production:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $DOCKERHUB_USERNAME/sifpi-be:$CI_COMMIT_SHORT_SHA --destination $DOCKERHUB_USERNAME/sifpi-be:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

docker-build-staging:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $DOCKERHUB_USERNAME/sifpi-be:$CI_COMMIT_SHORT_SHA --destination $DOCKERHUB_USERNAME/sifpi-be:staging
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

deploy-production:
  stage: deploy
  image: ghcr.io/railwayapp/cli:latest
  variables:
    RAILWAY_TOKEN: $RAILWAY_TOKEN_PROD
  script:
    - railway redeploy --service=$SVC_ID --environment=production -y
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-staging:
  stage: deploy
  image: ghcr.io/railwayapp/cli:latest
  variables:
    RAILWAY_TOKEN: $RAILWAY_TOKEN_STAGING
  script:
    - railway redeploy --service=$SVC_ID --environment=staging -y
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
